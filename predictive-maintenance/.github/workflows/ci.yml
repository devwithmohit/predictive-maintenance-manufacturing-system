# Continuous Integration Pipeline
# Triggers on PRs and pushes to main
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install ruff flake8

      - name: Run ruff
        run: ruff check predictive-maintenance/ --select E,F,W --ignore E501

      - name: Run flake8
        run: |
          flake8 predictive-maintenance/ \
            --max-line-length 120 \
            --extend-ignore E203,W503 \
            --exclude __pycache__,*.pyc,.git

  # ---------------------------------------------------------------------------
  # 2. Unit Tests
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run unit tests
        working-directory: predictive-maintenance
        run: |
          pytest tests/ -v -m "unit and not integration and not slow" \
            --tb=short \
            --junitxml=../test-results/unit-tests.xml \
            --cov=. \
            --cov-report=xml:../test-results/coverage.xml \
            --cov-report=term-missing \
            || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results/

  # ---------------------------------------------------------------------------
  # 3. Integration Tests
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx kafka-python psycopg2-binary

      - name: Start infrastructure
        working-directory: predictive-maintenance/infra/kafka
        run: |
          docker compose up -d
          echo "Waiting for infrastructure to be healthy..."
          sleep 30
          docker compose ps

      - name: Start application services
        working-directory: predictive-maintenance
        run: |
          docker compose up -d --build inference-api stream-processor alert-engine
          echo "Waiting for services to start..."
          sleep 20
          docker compose ps

      - name: Run integration tests
        working-directory: predictive-maintenance
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: predictive_maintenance
          DB_USER: pmuser
          DB_PASSWORD: pmpassword
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          INFERENCE_API_URL: http://localhost:8000
          ALERT_ENGINE_URL: http://localhost:8001
        run: |
          pytest tests/integration/ -v -m integration \
            --tb=short \
            --junitxml=../test-results/integration-tests.xml \
            || true

      - name: Collect service logs
        if: always()
        working-directory: predictive-maintenance
        run: |
          docker compose logs --tail=100 > ../test-results/service-logs.txt 2>&1
          cd infra/kafka && docker compose logs --tail=100 >> ../../../test-results/infra-logs.txt 2>&1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: test-results/

      - name: Tear down
        if: always()
        working-directory: predictive-maintenance
        run: |
          docker compose down -v
          cd infra/kafka && docker compose down -v

  # ---------------------------------------------------------------------------
  # 4. Build Docker Images
  # ---------------------------------------------------------------------------
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    strategy:
      matrix:
        service:
          - name: inference-api
            context: predictive-maintenance/inference_service
          - name: alert-engine
            context: predictive-maintenance/alerting
          - name: stream-processor
            context: predictive-maintenance/stream_processor
          - name: cmapss-streamer
            context: predictive-maintenance/data_loader
          - name: dashboard
            context: predictive-maintenance/dashboard/streamlit_app
          - name: retrain-scheduler
            context: predictive-maintenance/ml_pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service.name }}
        run: |
          docker build -t pm-${{ matrix.service.name }}:ci-${{ github.sha }} \
            ${{ matrix.service.context }}

      - name: Verify image
        run: docker image inspect pm-${{ matrix.service.name }}:ci-${{ github.sha }}
